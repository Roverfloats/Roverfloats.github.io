    <link rel="stylesheet" href="../../styling/nav-style.css">
    <link rel="stylesheet" href="../../styling/casus-footer-style.css">
</head>
<body>
    <div class="header">
        <div class="header-empty1"></div>
        <div class="header-empty2">
            <div class="header-text">Component Library</div>
        </div>
    </div>

    <div class="container">
        <nav class="nav">
            <div class="nav-text">Input &amp; Textarea</div>
            <a class="button-home button-nav" href="../../index.html">Home</a>
            <a class="button-nav" href="../title/casus-title.html">Title</a>
            <a class="button-nav" href="../button/casus-button.html">Button</a>            
            <a class="button-nav" href="../paragrath/casus-paragrath.html">Paragrath</a>
            <a class="button-nav" href="../checkbox-radio/casus-checkrad.html">Checkbox &amp; Radio</a>

            <a class="button-nav" href="../tables/casus-tables.html">Tables &amp; lists</a>
        </nav>

        <div class="main">
            <div class="unstyled-textarea-box">unstyled textarea
                <form>
                    <textarea class="textarea-no-resize" cols="30" rows="10"></textarea>
                </form>
            </div>

            <div class="styled-textarea-box">styled textarea
                <form>
                    <textarea class="textarea-no-resize textarea-styled" placeholder="enter text here..." cols="30" rows="10"></textarea>
                </form>
            </div>

            <div class="unstyled-input-box"> unstyled input
                <form>
                    <input type="text">
                </form>
            </div>

            <div class="styled-input-box"> styled input
                <form>
                    <input class="styled-input"  placeholder="enter text here..." type="text">
                </form>
            </div>


        </div>
    </div>

    <footer class="footer">
        <div class="footer-text-container">
            <p>made by: Roverfloats</p>
        </div>
    </footer>
